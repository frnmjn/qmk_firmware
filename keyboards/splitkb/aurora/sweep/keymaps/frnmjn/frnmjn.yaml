layout:
  ortho_layout:
    split: true
    rows: 3
    columns: 5
    thumbs: 1
layers:
  DEF:
    - [Q, W, E, R, T, Y, U, I, O, P]
    - [
        { h: Cmd, t: A },
        { h: Alt, t: S },
        { h: Ctrl, t: D },
        { h: Shift, t: F },
        G,
        H,
        { h: Shift, t: J },
        { h: Ctrl, t: K },
        { h: Alt, t: L },
        { h: Cmd, t: ";", s: ":" },
      ]
    - [
        Z,
        X,
        C,
        V,
        B,
        N,
        M,
        { t: ",", s: "<" },
        { t: ".", s: ">" },
        { t: "/", s: "?" },
      ]
    - { h: NAV, t: SPC }
    - { t: BSPC }
  NAV:
    - ["", "", "", "", "PgUp", "", "", "", "", ""]
    - ["Home", "", "", "Shift", "PgDn", "Sx", "Dn", "Up", "Dx", "End"]
    - ["", "", "", "", "", "", "", "", "", ""]
    - { type: "held" }
    - { t: DEL }
  NUM:
    - ["", "", "", "", "", "", "7", "8", "9", "*"]
    - ["", { type: "held" }, { type: "held" }, "0", "", "-", "4", "5", "6", "+"]
    - ["", "", "", "", "", "0", "1", "2", { s: ".", t: "3" }, "/"]
    - { t: "" }
    - { t: "" }
  MIX:
    - ["MEH-Q", "MEH-W", "MEH-E", "MEH-R", "MEH-T", "", "", "", "", ""]
    - [
        "MEH-A",
        "MEH-S",
        "MEH-D",
        "MEH-F",
        "MEH-G",
        "",
        "",
        { type: "held" },
        { type: "held" },
        "",
      ]
    - ["Undo", "Cut", "Copy", "Paste", "Redo", "", "", "", "", ""]
    - { t: "" }
    - { t: "" }
  combos_2:
    - ["", "", "", "", "", "", "", "", "", ""]
    - ["", "", "", "", "", "", "", "", "", ""]
    - ["", "", "", "", "", "", "", "", "", ""]
    - { t: "" }
    - { t: "" }
  combos_2_shifted:
    - ["", "", "", "", "", "", "", "", "", ""]
    - ["", "", "", "", "", "", "", "", "", ""]
    - ["", "", "", "", "", "", "", "", "", ""]
    - { t: "" }
    - { t: "" }
  combos_3:
    - ["", "", "", "", "", "", "", "", "", ""]
    - ["", "", "", "", "", "", "", "", "", ""]
    - ["", "", "", "", "", "", "", "", "", ""]
    - { t: "" }
    - { t: "" }
  combos_3_shifted:
    - ["", "", "", "", "", "", "", "", "", ""]
    - ["", "", "", "", "", "", "", "", "", ""]
    - ["", "", "", "", "", "", "", "", "", ""]
    - { t: "" }
    - { t: "" }
combos:
  #- { l: ["NUM"], p: [6, 7, 8], k: "Zoom In", a: bottom }
  #- { l: ["NUM"], p: [26, 27, 28], k: "Zoom Out", a: bottom }
  - { l: ["combos_2"], p: [0, 1], k: "~" }
  - { l: ["combos_2_shifted"], p: [0, 1], k: ":wq" }
  - { l: ["combos_2"], p: [1, 2], k: "@" }
  - { l: ["combos_2"], p: [2, 3], k: "!" }
  - { l: ["combos_2"], p: [12, 13], k: ENT }
  - { l: ["combos_2"], p: [13, 16], k: CW }
  - { l: ["combos_3_shifted"], p: [11, 12, 13], k: "*" }
  - { l: ["combos_2"], p: [21, 22], k: "^" }
  - { l: ["combos_2_shifted"], p: [21, 22], k: "$" }
  - { l: ["combos_2"], p: [22, 23], k: "\\" }
  - { l: ["combos_3"], p: [21, 22, 23], k: ":-(" }
  - { l: ["combos_2"], p: [6, 7], k: "_" }
  - { l: ["combos_2_shifted"], p: [6, 7], k: "-" }
  - { l: ["combos_2"], p: [7, 8], k: "|" }
  - { l: ["combos_2_shifted"], p: [7, 8], k: "||" }
  - { l: ["combos_2"], p: [6, 16], k: "(" }
  - { l: ["combos_2"], p: [7, 17], k: "{" }
  - { l: ["combos_2"], p: [8, 18], k: "[" } 
  - { l: ["combos_2_shifted"], p: [6, 16], k: ")" }
  - { l: ["combos_2_shifted"], p: [7, 17], k: "}" }
  - { l: ["combos_2_shifted"], p: [8, 18], k: "]" }
  - { l: ["combos_3"], p: [16, 17, 18], k: ESC }
  - { l: ["combos_3_shifted"], p: [16, 17, 18], k: "=" }
  - { l: ["combos_3"], p: [11, 12, 13], k: "&" }
  - { l: ["combos_2"], p: [16, 17], k: TAB }
  - { l: ["combos_2"], p: [17, 27], k: "'" }
  - { l: ["combos_2_shifted"], p: [16, 26], k: '""' }
  - { l: ["combos_2"], p: [16, 26], k: '"' }
  - { l: ["combos_2_shifted"], p: [17, 27], k: "''" }
  - { l: ["combos_2"], p: [18, 28], k: "%" }
  - { l: ["combos_2_shifted"], p: [26, 27], k: "#[]" }
  - { l: ["combos_2"], p: [26, 27], k: "#" }
  - { l: ["combos_2"], p: [27, 28], k: "<>" }
  - { l: ["combos_2_shifted"], p: [27, 28], k: "::" }
  - { l: ["combos_2_shifted"], p: [18, 28], k: "%{}" }
  - { l: ["combos_3"], p: [26, 27, 28], k: ":-)" }
